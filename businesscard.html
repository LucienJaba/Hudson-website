<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hudson Development LLC — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0B1D3A;
      --navy-light: #122B52;
      --ink: #04090F;
      --white: #FFFFFF;
      --bone: #F4F1E9;
      --bone-deep: #EAE4D6;
      --gold: #C9A84C;
      --gold-light: #E2C878;
      --gold-dark: #A88B35;
      --gray: #7C8AA1;
      --display: 'Fraunces', Georgia, serif;
      --body: 'Hanken Grotesk', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--body);
      background: #1a1a2e;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 48px;
    }

    h1 {
      font-family: var(--display);
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .cards {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card-label {
      font-family: var(--body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .card {
      width: 3.5in;
      height: 2in;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(6, 15, 31, 0.5);
      position: relative;
    }

    /* ── FRONT ── */
    .card-front {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 1px solid rgba(201, 168, 76, 0.15);
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(201, 168, 76, 0.12);
      border-radius: 4px;
      pointer-events: none;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
      margin-bottom: 12px;
    }

    .logo-letter {
      font-family: var(--display);
      font-weight: 700;
      font-size: 38px;
      color: var(--gold);
      line-height: 1;
    }

    .logo-goose {
      color: var(--gold);
      margin: 0 -2px;
      position: relative;
      top: 2px;
    }

    .company-name {
      font-family: var(--display);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }

    .front-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
      margin: 8px 0;
    }

    .company-sub {
      font-family: var(--body);
      font-weight: 400;
      font-size: 6.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── BACK ── */
    .card-back {
      background: var(--bone);
      display: flex;
      padding: 0;
    }

    .back-accent {
      width: 6px;
      background: linear-gradient(180deg, var(--navy), var(--navy-light));
      flex-shrink: 0;
    }

    .back-content {
      flex: 1;
      padding: 16px 18px 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .person-info { flex: 1; }

    .person-name {
      font-family: var(--display);
      font-weight: 600;
      font-size: 13px;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .person-title {
      font-family: var(--body);
      font-weight: 500;
      font-size: 7px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-dark);
    }

    .back-goose-mark {
      color: var(--navy);
      opacity: 0.08;
      flex-shrink: 0;
      margin-top: -4px;
      margin-right: -4px;
    }

    .back-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--gold), var(--bone-deep));
      margin: 8px 0;
    }

    .services {
      font-family: var(--body);
      font-weight: 500;
      font-size: 7px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .services span {
      color: var(--gold-dark);
      margin: 0 6px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .contact-item svg {
      flex-shrink: 0;
      color: var(--gold-dark);
    }

    .contact-item span {
      font-family: var(--body);
      font-size: 6.5px;
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.02em;
    }

    .back-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 6px;
    }

    .location {
      font-family: var(--body);
      font-size: 6px;
      font-weight: 400;
      color: var(--gray);
      letter-spacing: 0.08em;
    }

    .social-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .social-links a {
      color: var(--navy);
      opacity: 0.5;
      transition: opacity 0.2s;
      display: flex;
    }

    .social-links a:hover { opacity: 1; }

    /* ── PRINT ── */
    @media print {
      body {
        background: white;
        padding: 0;
        gap: 24px;
      }
      h1, .card-label { display: none; }
      .card { box-shadow: none; border: 0.5px solid #ccc; }
      .cards { gap: 24px; }
    }

    @media (max-width: 480px) {
      .card {
        width: calc(100vw - 40px);
        height: auto;
        aspect-ratio: 3.5 / 2;
      }
      .logo-letter { font-size: 28px; }
      .company-name { font-size: 9px; }
    }
  </style>
</head>

</body>
</html>
